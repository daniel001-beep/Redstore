<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RedStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --white: #ffffff;
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .account-container {
            max-width: 450px;
            width: 100%;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .account-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 2rem;
            text-align: center;
            color: var(--white);
        }

        .account-header img {
            width: 120px;
            margin-bottom: 1rem;
            filter: brightness(0) invert(1);
        }

        .account-header h1 {
            color: var(--white);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            background: none;
            -webkit-text-fill-color: var(--white);
        }

        .account-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }

        .account-tabs {
            display: flex;
            padding: 1rem 1rem 0;
            gap: 0.5rem;
        }

        .account-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            border-radius: 10px 10px 0 0;
            font-weight: 600;
            color: var(--gray);
            transition: all 0.3s ease;
            position: relative;
        }

        .account-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .account-tab.active {
            color: var(--primary);
            background: linear-gradient(to top, rgba(37, 99, 235, 0.05), transparent);
        }

        .account-tab.active::after {
            transform: scaleX(1);
        }

        .account-forms {
            padding: 2rem;
        }

        .account-form {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .account-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group label i {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            transition: color 0.3s ease;
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray);
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .account-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .account-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .account-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin: 1rem 2rem;
            padding: 1rem;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .message.show {
            display: flex;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .message i {
            font-size: 1.1rem;
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .demo-hint {
            margin-top: 2rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            font-size: 0.875rem;
        }

        .demo-hint p {
            color: var(--gray);
            margin: 0.25rem 0;
        }

        .demo-hint i {
            color: var(--primary);
            margin-right: 0.5rem;
        }

        @media (max-width: 500px) {
            .account-forms {
                padding: 1.5rem;
            }

            .form-options {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="account-container">
        <div class="account-header">
            <img src="images/logo.png" alt="RedStore Logo">
            <h1>Welcome Back!</h1>
            <p>Sign in to your account or create a new one</p>
        </div>

        <div class="account-tabs">
            <div class="account-tab active" onclick="switchTab('signin')">Sign In</div>
            <div class="account-tab" onclick="switchTab('signup')">Create Account</div>
        </div>

        <div id="message" class="message">
            <i class="fas"></i>
            <span></span>
        </div>

        <div class="account-forms">
            <div class="account-form active" id="signin-form">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="signin-email" placeholder="Enter your email" required>
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="signin-password" placeholder="Enter your password" required>
                            <i class="fas fa-lock"></i>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('signin-password', this)"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember-me">
                            <label for="remember-me">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password" onclick="showMessage('Password reset coming soon!', 'info'); return false;">Forgot Password?</a>
                    </div>

                    <button type="button" class="account-btn" onclick="handleSignIn()">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
            </div>

            <div class="account-form" id="signup-form">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="signup-name" placeholder="Enter your full name" required>
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="signup-email" placeholder="Enter your email" required>
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="signup-password" placeholder="Create a password" required>
                            <i class="fas fa-lock"></i>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('signup-password', this)"></i>
                        </div>
                        <small style="color: var(--gray); margin-top: 0.25rem; display: block;">
                            Password must be at least 6 characters
                        </small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="signup-confirm-password" placeholder="Confirm your password" required>
                            <i class="fas fa-lock"></i>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('signup-confirm-password', this)"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="terms-checkbox" required>
                            <label for="terms-checkbox">I agree to the <a href="#">Terms</a> & <a href="#">Privacy</a></label>
                        </div>
                    </div>

                    <button type="button" class="account-btn" onclick="handleSignUp()">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
            </div>
        </div>

        <div class="demo-hint">
            <p><i class="fas fa-info-circle"></i> Demo credentials:</p>
            <p>Email: test@example.com</p>
            <p>Password: password123</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <script>
        if (typeof firebase !== 'undefined') {
            const firebaseConfig = {
                apiKey: "AIzaSyA5JxTXi3NbfWbXhdPivrxQEBmvxjvJjqw",
                authDomain: "redstore-app-ea5bf.firebaseapp.com",
                projectId: "redstore-app-ea5bf",
                storageBucket: "redstore-app-ea5bf.firebasestorage.app",
                messagingSenderId: "408128968917",
                appId: "1:408128968917:web:e63971921ee039c5f42a5c"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            function switchTab(tabName) {
                document.querySelectorAll('.account-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.account-form').forEach(f => f.classList.remove('active'));
                
                if (tabName === 'signin') {
                    document.querySelectorAll('.account-tab')[0].classList.add('active');
                    document.getElementById('signin-form').classList.add('active');
                } else {
                    document.querySelectorAll('.account-tab')[1].classList.add('active');
                    document.getElementById('signup-form').classList.add('active');
                }
                hideMessage();
            }

            function handleSignIn() {
                const email = document.getElementById('signin-email').value.trim();
                const password = document.getElementById('signin-password').value;
                
                if (!email || !password) {
                    showMessage('Please fill in all fields', 'error');
                    return;
                }
                
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                btn.disabled = true;
                
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        showMessage('Signed in successfully! Redirecting...', 'success');
                        localStorage.setItem('currentUser', JSON.stringify({
                            uid: userCredential.user.uid,
                            email: userCredential.user.email,
                            displayName: userCredential.user.displayName
                        }));
                        setTimeout(() => window.location.href = 'shop.html', 1500);
                    })
                    .catch((error) => {
                        let msg = error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' 
                            ? 'Invalid email or password' 
                            : 'Error: ' + error.message;
                        showMessage(msg, 'error');
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
            }

            function handleSignUp() {
                const name = document.getElementById('signup-name').value.trim();
                const email = document.getElementById('signup-email').value.trim();
                const password = document.getElementById('signup-password').value;
                const confirm = document.getElementById('signup-confirm-password').value;
                const termsChecked = document.getElementById('terms-checkbox').checked;
                
                if (!name || !email || !password || !confirm) {
                    showMessage('Please fill in all fields', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showMessage('Password must be at least 6 characters', 'error');
                    return;
                }
                
                if (password !== confirm) {
                    showMessage('Passwords do not match', 'error');
                    return;
                }
                
                if (!termsChecked) {
                    showMessage('Please agree to the Terms & Conditions', 'error');
                    return;
                }
                
                const btn = event.target;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
                btn.disabled = true;
                
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        return userCredential.user.updateProfile({ displayName: name })
                            .then(() => {
                                showMessage('Account created! Redirecting...', 'success');
                                localStorage.setItem('currentUser', JSON.stringify({
                                    uid: userCredential.user.uid,
                                    email: email,
                                    displayName: name
                                }));
                                setTimeout(() => window.location.href = 'shop.html', 1500);
                            });
                    })
                    .catch((error) => {
                        let msg = error.code === 'auth/email-already-in-use' 
                            ? 'Email already registered' 
                            : 'Error: ' + error.message;
                        showMessage(msg, 'error');
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
            }

            function togglePassword(id, icon) {
                const input = document.getElementById(id);
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            }

            function showMessage(text, type) {
                const msg = document.getElementById('message');
                msg.className = `message ${type} show`;
                msg.querySelector('span').textContent = text;
                if (type === 'success') setTimeout(hideMessage, 3000);
            }

            function hideMessage() {
                document.getElementById('message').classList.remove('show');
            }
        }
    </script>
    <script src="main.js"></script>
</body>
</html>
